<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Django ToDo App Edit</title>
    <link rel="stylesheet" href="style.css">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</head>
<body>
    <div class="container">
        <h3 class="pt-5 pb-5 text-center">Django ToDo App Edits Tasks</h3>
        <form action="{% url 'edit_task' get_task.id %}" method="POST" style="width: 500px; margin: auto;">
            {% csrf_token %}
                <div class="form-group">
                    <span style="display: flex;">
                        <input type="text" name="task" class="form-control" placeholder="Add a task" value="{{ get_task.task }}">
                        <button type="submit" class="btn btn-primary"> Update </button>
                    </span>
                </div>
            </form>

</body>
</html>
