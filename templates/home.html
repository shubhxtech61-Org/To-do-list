{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo__list</title>

    <!-- Meta -->
    <meta name="description" content="Your website description">
    <meta name="author" content="Your Name">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <h3 class="pt-5 text-center">Django ToDo App</h3>
        <div class="row">
            <h4>My Day</h4>
            <p class="text-muted"> {%now "jS F Y" %} </p>
            <div class=" col-md-7 col-lg-7" style="height: 450px; overflow:scroll;">

                <!--List of all the tasks for the day -->
                {% for task in tasks %}
                <div class="card m-1">
                    <div class="card-body">
                        {{ task.task}}
                        <span style="position: relative; float: right;">
                            <a href="{% url 'mark_as_done' task.pk %}"class="btn btn-success"><i class="fa fa-check"></i>Mark As Done</a>
                            <a href="{% url 'delete_task' task.id %}" class="btn btn-danger"><i class="fa fa-trash"></i>Delete</a>
                            <a href="{% url 'edit_task' task.id %}" class="btn btn-primary"><i class="fa fa-pencil"></i>Edit</a>
                        </span>
                    </div>
                </div>
                {% endfor %}
            </div>
            <div class="col-md-5 col-lg-5">
                <h5>Complted Tasks</h5>
                <!-- List of all the completed tasks -->
                {% for task in completed_tasks %}
                <div class="card m-1">
                    <div class="card-body">
                        {{ task.task }}
                        <span style="position: relative; float: right;">
                            <a href="{% url 'mark_as_undone' task.pk %}" class="btn btn-warning"><i class="fa fa-times"></i>Mark As Undone</a>
                        </span>
                    </div>
                </div>
                {% endfor %}
            </div>

        </div>
        <div class="row">
            <div class="col-md-7 col-lg-7" style="position: absolute; bottom: 50px;">
                <!-- To Do form -->
                <form action="{% url 'addTask' %}" method="POST">
                {% csrf_token %}
                    <div class="form-group">
                        <span style="display: flex;">
                            <input type="text" name="task" class="form-control" placeholder="Add a task">
                            <button type="submit" class="btn btn-primary"> Add </button>
                        </span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
